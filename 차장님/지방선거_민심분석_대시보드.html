<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 지방선거 민심 분석</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ppp-color: #D32F2F;
            --ppp-light: #FFCDD2;
            --ppp-gradient: linear-gradient(135deg, #D32F2F 0%, #B71C1C 100%);
            --dem-color: #1565C0;
            --dem-light: #BBDEFB;
            --dem-gradient: linear-gradient(135deg, #1565C0 0%, #0D47A1 100%);
            --positive: #5C9CE5;
            --negative: #E57373;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #1a1a1a;
            --text-mid: #666666;
            --text-light: #999999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
            color: var(--text-dark);
        }

        .container {
            max-width: 1900px;
            margin: 0 auto;
            padding: 30px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 42px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .header .subtitle {
            font-size: 18px;
            color: var(--text-mid);
            margin-bottom: 15px;
        }

        .header .meta {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 14px;
            color: var(--text-light);
        }

        .net-score-note {
            background: #f0f0f0;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-mid);
            display: inline-block;
            margin-top: 15px;
        }

        .net-score-note strong { color: var(--text-dark); }

        /* Summary Stats */
        .summary-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .summary-stat {
            background: var(--card-bg);
            padding: 20px 35px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .summary-stat .label {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 5px;
        }

        .summary-stat .value {
            font-size: 32px;
            font-weight: 800;
        }

        .summary-stat .value.ppp { color: var(--ppp-color); }
        .summary-stat .value.dem { color: var(--dem-color); }
        .summary-stat .value.positive { color: var(--positive); }
        .summary-stat .value.negative { color: var(--negative); }

        /* Legend */
        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .legend-dot {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .legend-dot.ppp { background: var(--ppp-color); }
        .legend-dot.dem { background: var(--dem-color); }

        /* Map Section */
        .map-section {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 25px;
            margin-bottom: 40px;
        }

        .left-cards, .right-cards {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 320px;
        }

        .map-container {
            position: relative;
            width: 550px;
            min-height: 750px;
            flex-shrink: 0;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .korea-map {
            width: 100%;
            height: auto;
        }

        /* Region Card - 새로운 디자인 */
        .region-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .region-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
        }

        .region-card.ppp::before {
            background: var(--ppp-gradient);
        }

        .region-card.dem::before {
            background: var(--dem-gradient);
        }

        .region-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        .region-card.ppp:hover {
            border-color: var(--ppp-light);
        }

        .region-card.dem:hover {
            border-color: var(--dem-light);
        }

        /* 단체장 사진 */
        .governor-photo {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            flex-shrink: 0;
        }

        .region-card.ppp .governor-photo {
            border-color: var(--ppp-light);
        }

        .region-card.dem .governor-photo {
            border-color: var(--dem-light);
        }

        /* 지역 정보 영역 */
        .region-info {
            flex: 1;
            min-width: 0;
        }

        .region-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .region-logo {
            height: 20px;
            width: auto;
            object-fit: contain;
        }

        .region-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .governor-name {
            font-size: 12px;
            color: var(--text-mid);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .region-slogan {
            font-size: 11px;
            color: #fff;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 10px;
            display: inline-block;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .region-card.ppp .region-slogan {
            background: var(--ppp-gradient);
        }

        .region-card.dem .region-slogan {
            background: var(--dem-gradient);
        }

        /* 점수 영역 */
        .region-scores {
            text-align: right;
            flex-shrink: 0;
        }

        .net-score {
            font-size: 24px;
            font-weight: 800;
            line-height: 1;
        }

        .net-score.positive { color: var(--positive); }
        .net-score.negative { color: var(--negative); }
        .net-score.warning { color: #FF9800; }

        .score-detail {
            font-size: 10px;
            color: var(--text-light);
            margin-top: 4px;
        }

        .score-bar {
            display: flex;
            height: 4px;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 4px;
            background: #e8e8e8;
            width: 60px;
            margin-left: auto;
        }

        .score-bar .positive-bar {
            background: var(--positive);
        }

        .score-bar .negative-bar {
            background: var(--negative);
        }

        /* Rankings Section */
        .rankings-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            margin-top: 40px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }

        .rankings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 12px;
        }

        .rank-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: #fafafa;
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .rank-card:hover {
            background: #f0f0f0;
        }

        .rank-number {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .rank-1 { background: linear-gradient(135deg, #FFD700, #FFA500); color: #fff; }
        .rank-2 { background: linear-gradient(135deg, #C0C0C0, #A0A0A0); color: #fff; }
        .rank-3 { background: linear-gradient(135deg, #CD7F32, #8B4513); color: #fff; }
        .rank-default { background: #e0e0e0; color: #666; }

        .rank-governor-photo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .rank-info { flex: 1; }

        .rank-region {
            font-weight: 600;
            font-size: 14px;
        }

        .rank-governor {
            font-size: 11px;
            color: var(--text-light);
        }

        .rank-score {
            font-size: 22px;
            font-weight: 800;
        }

        .rank-score.high { color: var(--positive); }
        .rank-score.mid { color: #FF9800; }
        .rank-score.low { color: var(--negative); }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card-bg);
            border-radius: 24px;
            max-width: 850px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-header {
            padding: 24px 28px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--card-bg);
            z-index: 10;
            border-radius: 24px 24px 0 0;
        }

        .modal-header-content {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .modal-governor-photo {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #eee;
        }

        .modal-title-area {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-logo {
            height: 24px;
            object-fit: contain;
        }

        .modal-subtitle {
            font-size: 14px;
            color: var(--text-mid);
        }

        .modal-slogan {
            font-size: 12px;
            color: #fff;
            padding: 4px 10px;
            border-radius: 12px;
            display: inline-block;
        }

        .modal-slogan.ppp {
            background: var(--ppp-gradient);
        }

        .modal-slogan.dem {
            background: var(--dem-gradient);
        }

        .modal-close {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #f0f0f0;
            cursor: pointer;
            font-size: 24px;
            color: var(--text-mid);
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: #e0e0e0;
            color: var(--text-dark);
        }

        .modal-body {
            padding: 28px;
        }

        .modal-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .modal-stat {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .modal-stat .label {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        .modal-stat .value {
            font-size: 26px;
            font-weight: 800;
        }

        .modal-charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .chart-box {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
        }

        .chart-title {
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 16px;
            color: var(--text-dark);
        }

        .chart-container {
            height: 220px;
            position: relative;
        }

        .status-banner {
            margin-top: 24px;
            padding: 20px;
            border-radius: 16px;
        }

        .status-banner.danger {
            background: linear-gradient(135deg, #ffebee, #ffcdd2);
        }

        .status-banner.warning {
            background: linear-gradient(135deg, #fff3e0, #ffe0b2);
        }

        .status-banner.success {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
        }

        .status-banner h4 {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .status-banner p {
            font-size: 14px;
            color: var(--text-mid);
            line-height: 1.6;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            font-size: 12px;
            color: var(--text-light);
        }

        /* Responsive */
        @media (max-width: 1500px) {
            .map-section {
                flex-direction: column;
                align-items: center;
            }
            .left-cards, .right-cards {
                flex-direction: row;
                flex-wrap: wrap;
                width: 100%;
                justify-content: center;
            }
            .region-card {
                width: 320px;
            }
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 28px; }
            .map-container { width: 100%; min-height: 500px; }
            .region-card { width: 100%; }
            .modal-stats { grid-template-columns: repeat(2, 1fr); }
            .modal-charts { grid-template-columns: 1fr; }
        }
    </style>
</head>

        <!-- Footer -->
        <footer class="footer">

        </footer>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">

                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

        // 지역 카드 생성
        function createRegionCard(region) {
            const scoreClass = region.netScore >= 15 ? 'positive' : (region.netScore < 0 ? 'negative' : 'warning');

            return `
                <div class="region-card ${region.party}" onclick="openModal('${region.id}')">
                    <img class="governor-photo" src="${region.governorPhoto}" alt="${region.governor}"

                    <div class="region-info">
                        <div class="region-header">
                            <img class="region-logo" src="${region.logo}" alt="${region.name}" onerror="this.style.display='none'">
                            <span class="region-name">${region.name}</span>
                        </div>
                        <div class="governor-name">${region.governor}${region.note ? ' (' + region.note + ')' : ''}</div>
                        <div class="region-slogan">${region.slogan}</div>
                    </div>
                    <div class="region-scores">
                        <div class="net-score ${scoreClass}">${region.netScore >= 0 ? '+' : ''}${region.netScore}</div>
                        <div class="score-detail">${region.positive}% / ${region.negative}%</div>
                        <div class="score-bar">
                            <div class="positive-bar" style="width:${region.positive}%"></div>
                            <div class="negative-bar" style="width:${region.negative}%"></div>
                        </div>
                    </div>

        }

            const rightContainer = document.getElementById('rightCards');

                const region = regionData.find(r => r.id === id);
                if (region) leftContainer.innerHTML += createRegionCard(region);
            });

            rightRegions.forEach(id => {
                const region = regionData.find(r => r.id === id);
                if (region) rightContainer.innerHTML += createRegionCard(region);
            });
        }

        // 순위 렌더링
        function renderRankings() {
            const grid = document.getElementById('rankingsGrid');
            const sorted = [...regionData].sort((a, b) => b.netScore - a.netScore);

            sorted.forEach((region, index) => {
                const rank = index + 1;
                const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-default';
                const scoreClass = region.netScore >= 20 ? 'high' : region.netScore >= 0 ? 'mid' : 'low';

                grid.innerHTML += `
                    <div class="rank-card" onclick="openModal('${region.id}')">
                        <div class="rank-number ${rankClass}">${rank}</div>
                        <img class="rank-governor-photo" src="${region.governorPhoto}" alt="${region.governor}"
                             onerror="this.src='https://via.placeholder.com/40x40?text=${region.governor.charAt(0)}'">
                        <div class="rank-info">
                            <div class="rank-region">${region.name}</div>
                            <div class="rank-governor">${region.governor} (${region.party === 'ppp' ? '국민의힘' : '민주당'})</div>
                        </div>
                        <div class="rank-score ${scoreClass}">${region.netScore >= 0 ? '+' : ''}${region.netScore}</div>
                    </div>
                `;
            });
        }

        // Modal
        let modalAgeChart, modalOrientChart;

        function openModal(id) {
            const region = regionData.find(r => r.id === id);
            if (!region) return;

            const headerContent = document.getElementById('modalHeaderContent');
            headerContent.innerHTML = `
                <img class="modal-governor-photo" src="${region.governorPhoto}" alt="${region.governor}"
                     onerror="this.src='https://via.placeholder.com/70x70?text=${region.governor.charAt(0)}'">

                    <div class="modal-title">

                    <span class="modal-slogan ${region.party}">${region.slogan}</span>
                </div>
            `;

            const statusClass = region.netScore < 0 ? 'danger' : region.netScore < 10 ? 'warning' : 'success';
            const statusTitle = region.netScore < 0 ? '위험 신호' : region.netScore < 10 ? '주의 필요' : '안정적';

            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="modal-stats">
                    <div class="modal-stat">
                        <div class="label">긍정률</div>
                        <div class="value" style="color:var(--positive)">${region.positive}%</div>
                    </div>
                    <div class="modal-stat">
                        <div class="label">부정률</div>
                        <div class="value" style="color:var(--negative)">${region.negative}%</div>
                    </div>
                    <div class="modal-stat">
                        <div class="label">Net Score</div>
                        <div class="value" style="color:${region.netScore >= 0 ? 'var(--positive)' : 'var(--negative)'}">${region.netScore >= 0 ? '+' : ''}${region.netScore}</div>
                    </div>
                    <div class="modal-stat">
                        <div class="label">표본수</div>
                        <div class="value" style="color:var(--text-mid)">${region.sample.toLocaleString()}</div>
                    </div>
                </div>

                <div class="modal-charts">
                    <div class="chart-box">
                        <div class="chart-title">연령대별 Net Score</div>
                        <div class="chart-container">
                            <canvas id="modalAgeChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-box">
                        <div class="chart-title">정치성향별 Net Score</div>
                        <div class="chart-container">
                            <canvas id="modalOrientChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="status-banner ${statusClass}">
                    <h4>${statusTitle}</h4>
                    <p>${statusMsg}</p>
                </div>
            `;

            document.getElementById('modalOverlay').classList.add('active');

            // Create charts
            setTimeout(() => {
                if (modalAgeChart) modalAgeChart.destroy();
                if (modalOrientChart) modalOrientChart.destroy();

                const ageCtx = document.getElementById('modalAgeChart');
                const ageData = Object.entries(region.ages);

                modalAgeChart = new Chart(ageCtx, {
                    type: 'bar',
                    data: {
                        labels: ageData.map(([k]) => k),
                        datasets: [{
                            data: ageData.map(([k, v]) => v),
                            backgroundColor: ageData.map(([k, v]) => v >= 0 ? '#5C9CE5' : '#E57373'),
                            borderRadius: 6,
                            borderSkipped: false
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        indexAxis: 'y',
                        plugins: {
                            legend: { display: false },
                            datalabels: {
                                anchor: 'end',
                                align: 'end',
                                color: (ctx) => ctx.dataset.data[ctx.dataIndex] >= 0 ? '#5C9CE5' : '#E57373',

                            },

                        plugins: {
                            legend: { display: false },
                            datalabels: {
                                anchor: 'end',
                                align: 'end',
                                color: (ctx) => ctx.dataset.data[ctx.dataIndex] >= 0 ? '#5C9CE5' : '#E57373',

                                formatter: (val) => (val >= 0 ? '+' : '') + val

        // D3.js로 지도 렌더링 (제주도 포함되도록 조정)
        async function renderMap() {
            const width = 520;
            const height = 720;

            const svg = d3.select('#mapContainer')
                .append('svg')
                .attr('class', 'korea-map')
                .attr('viewBox', `0 0 ${width} ${height}`)
                .attr('preserveAspectRatio', 'xMidYMid meet');

            try {
                const response = await fetch('https://raw.githubusercontent.com/southkorea/southkorea-maps/master/kostat/2018/json/skorea-provinces-2018-topo-simple.json');
                const topoData = await response.json();
                let geojson = topojson.feature(topoData, topoData.objects.skorea_provinces_2018_geo);

                // 제주도가 보이도록 중심점과 스케일 조정
                const projection = d3.geoMercator()
                    .center([127.5, 35.5])
                    .scale(5200)
                    .translate([width / 2, height / 2]);

                const path = d3.geoPath().projection(projection);

                // 작은 섬들 필터링 (메인 영토만 유지)
                const minArea = 50;
                geojson.features = geojson.features.map(feature => {
                    if (feature.geometry.type === 'MultiPolygon') {
                        const filtered = feature.geometry.coordinates
                            .filter(polygon => {
                                const area = path.area({ type: 'Feature', geometry: { type: 'Polygon', coordinates: polygon } });
                                return area > minArea;
                            })
                            .sort((a, b) => {
                                const areaA = path.area({ type: 'Feature', geometry: { type: 'Polygon', coordinates: a } });
                                const areaB = path.area({ type: 'Feature', geometry: { type: 'Polygon', coordinates: b } });
                                return areaB - areaA;
                            })
                            .slice(0, 3);
                        feature.geometry.coordinates = filtered.length ? filtered : feature.geometry.coordinates.slice(0, 1);
                    }
                    return feature;
                });

                // 지도 그리기
                svg.selectAll('path')
                    .data(geojson.features)
                    .enter()
                    .append('path')
                    .attr('d', path)
                    .attr('id', d => 'map-' + codeToId[d.properties.code])
                    .style('fill', d => {
                        const id = codeToId[d.properties.code];
                        const region = regionData.find(r => r.id === id);
                        return region ? partyColors[region.party] : '#ccc';
                    })
                    .style('stroke', '#ffffff')
                    .style('stroke-width', '2px')
                    .style('cursor', 'pointer')
                    .style('transition', 'fill 0.2s')
                    .on('mouseover', function(event, d) {
                        const id = codeToId[d.properties.code];
                        const region = regionData.find(r => r.id === id);
                        d3.select(this).style('fill', region ? partyColorsHover[region.party] : '#ddd');
                    })
                    .on('mouseout', function(event, d) {
                        const id = codeToId[d.properties.code];
                        const region = regionData.find(r => r.id === id);
                        d3.select(this).style('fill', region ? partyColors[region.party] : '#ccc');
                    })
                    .on('click', function(event, d) {
                        const id = codeToId[d.properties.code];
                        if (id) openModal(id);
                    });

                // 지역명 라벨 + Net Score
                const labels = svg.selectAll('g.label')
                    .data(geojson.features)
                    .enter()
                    .append('g')
                    .attr('class', 'label')
                    .attr('transform', d => {
                        const centroid = path.centroid(d);
                        return `translate(${centroid[0]}, ${centroid[1]})`;
                    })
                    .style('pointer-events', 'none');

                // 지역명
                labels.append('text')
                    .attr('y', -6)
                    .attr('text-anchor', 'middle')
                    .style('font-size', '12px')
                    .style('font-weight', '700')
                    .style('fill', '#ffffff')
                    .style('text-shadow', '1px 1px 2px rgba(0,0,0,0.5)')
                    .text(d => shortNames[d.properties.name] || d.properties.name);

                // Net Score
                labels.append('text')
                    .attr('y', 10)
                    .attr('text-anchor', 'middle')
                    .style('font-size', '11px')
                    .style('font-weight', '800')
                    .style('fill', '#ffffff')
                    .style('text-shadow', '1px 1px 2px rgba(0,0,0,0.5)')
                    .text(d => {
                        const id = codeToId[d.properties.code];
                        const region = regionData.find(r => r.id === id);
                        if (region) {
                            return (region.netScore >= 0 ? '+' : '') + region.netScore;
                        }
                        return '';
                    });

            } catch (error) {
                console.error('지도 로딩 실패:', error);
                document.getElementById('mapContainer').innerHTML = '<p style="text-align:center;padding:50px;color:#999;">지도 로딩 중 오류가 발생했습니다.</p>';
            }
        }

        // Initialize
        renderCards();
        renderRankings();
        renderMap();
    </script>
