<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 지방선거 민심 분석</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ppp-color: #D32F2F;
            --ppp-light: #FFCDD2;
            --ppp-gradient: linear-gradient(135deg, #D32F2F 0%, #B71C1C 100%);
            --dem-color: #1565C0;
            --dem-light: #BBDEFB;
            --dem-gradient: linear-gradient(135deg, #1565C0 0%, #0D47A1 100%);
            --positive: #5C9CE5;
            --negative: #DC2626;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #1a1a1a;
            --text-mid: #666666;
            --text-light: #999999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
            color: var(--text-dark);
        }

        .container {
            max-width: 1900px;
            margin: 0 auto;
            padding: 30px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 42px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .header .subtitle {
            font-size: 18px;
            color: var(--text-mid);
            margin-bottom: 15px;
        }

        .header .meta {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 14px;
            color: var(--text-light);
        }

        .net-score-note {
            background: #f0f0f0;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-mid);
            display: inline-block;
            margin-top: 15px;
        }

        .net-score-note strong { color: var(--text-dark); }

        /* Summary Stats */
        .summary-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .summary-stat {
            background: var(--card-bg);
            padding: 20px 35px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .summary-stat .label {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 5px;
        }

        .summary-stat .value {
            font-size: 32px;
            font-weight: 800;
        }

        .summary-stat .value.ppp { color: var(--ppp-color); }
        .summary-stat .value.dem { color: var(--dem-color); }
        .summary-stat .value.positive { color: var(--positive); }
        .summary-stat .value.negative { color: var(--negative); }

        /* Legend */
        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .legend-dot {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .legend-dot.ppp { background: var(--ppp-color); }
        .legend-dot.dem { background: var(--dem-color); }

        /* Map Section */
        .map-section {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .left-cards, .right-cards {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 260px;
        }

        .map-container {
            position: relative;
            width: 500px;
            min-height: 680px;
            flex-shrink: 0;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .korea-map {
            width: 100%;
            height: auto;
        }

        /* Region Card - 알약형 + 정당색 테두리 */
        .region-card {
            background: #ffffff;
            border-radius: 30px;
            padding: 8px 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid #e0e0e0;
        }

        .region-card.ppp {
            border-color: #E57373;
        }

        .region-card.dem {
            border-color: #64B5F6;
        }

        .region-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
        }

        /* 로고 영역 */
        .card-logo-area {
            width: 140px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .region-logo-big {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* 단체장명 + 수치 */
        .card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-governor {
            font-size: 11px;
            color: #86868b;
            font-weight: 500;
        }

        .card-score {
            font-size: 13px;
            font-weight: 700;
        }

        .card-score.up {
            color: #FF3B30;
        }

        .card-score.down {
            color: #007AFF;
        }

        .card-score.same {
            color: #86868b;
        }

        .score-bar {
            display: flex;
            height: 4px;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 4px;
            background: #e8e8e8;
            width: 60px;
            margin-left: auto;
        }

        .score-bar .positive-bar {
            background: var(--positive);
        }

        .score-bar .negative-bar {
            background: var(--negative);
        }

        /* Rankings Section */
        .rankings-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            margin-top: 40px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }

        .rankings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 12px;
        }

        .rank-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: #fafafa;
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .rank-card:hover {
            background: #f0f0f0;
        }

        .rank-number {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .rank-1 { background: linear-gradient(135deg, #FFD700, #FFA500); color: #fff; }
        .rank-2 { background: linear-gradient(135deg, #C0C0C0, #A0A0A0); color: #fff; }
        .rank-3 { background: linear-gradient(135deg, #CD7F32, #8B4513); color: #fff; }
        .rank-default { background: #e0e0e0; color: #666; }

        .rank-governor-photo {
            width: auto;
            height: 50px;
            max-width: 70px;
            border-radius: 8px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .rank-info { flex: 1; }

        .rank-region {
            font-weight: 600;
            font-size: 14px;
        }

        .rank-governor {
            font-size: 11px;
            color: var(--text-light);
        }

        .rank-score {
            font-size: 22px;
            font-weight: 800;
        }

        .rank-score.high { color: var(--positive); }
        .rank-score.mid { color: #FF9800; }
        .rank-score.low { color: var(--negative); }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card-bg);
            border-radius: 24px;
            max-width: 850px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-header {
            padding: 24px 28px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--card-bg);
            z-index: 10;
            border-radius: 24px 24px 0 0;
        }

        .modal-header-content {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .modal-governor-photo {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #eee;
        }

        .modal-title-area {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-logo {
            height: 24px;
            object-fit: contain;
        }

        .modal-subtitle {
            font-size: 14px;
            color: var(--text-mid);
        }

        .modal-slogan {
            font-size: 12px;
            color: #fff;
            padding: 4px 10px;
            border-radius: 12px;
            display: inline-block;
        }

        .modal-slogan.ppp {
            background: var(--ppp-gradient);
        }

        .modal-slogan.dem {
            background: var(--dem-gradient);
        }

        .modal-close {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #f0f0f0;
            cursor: pointer;
            font-size: 24px;
            color: var(--text-mid);
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: #e0e0e0;
            color: var(--text-dark);
        }

        .modal-body {
            padding: 28px;
        }

        .modal-governor-section {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            padding: 14px 18px;
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            border-radius: 12px;
        }

        .modal-governor-photo {
            height: 160px;
            width: auto;
            max-width: 200px;
            object-fit: contain;
            flex-shrink: 0;
            border-radius: 10px;
        }

        .modal-governor-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }

        .modal-governor-region {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-dark);
        }

        .modal-governor-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-mid);
        }

        .modal-governor-party {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 2px;
            width: fit-content;
        }

        .modal-governor-party.ppp {
            background: var(--ppp-light);
            color: var(--ppp-color);
        }

        .modal-governor-party.dem {
            background: var(--dem-light);
            color: var(--dem-color);
        }

        .modal-score-change {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .modal-score-arrow {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 24px;
            font-weight: 800;
        }

        .modal-score-arrow .from {
            color: var(--text-mid);
        }

        .modal-score-arrow .arrow {
            font-size: 18px;
            color: var(--text-light);
        }

        .modal-score-arrow .to.positive {
            color: var(--positive);
        }

        .modal-score-arrow .to.negative {
            color: var(--negative);
        }

        .modal-score-delta {
            font-size: 13px;
            font-weight: 700;
            margin-top: 4px;
        }

        .modal-score-delta.up {
            color: #C62828;
        }

        .modal-score-delta.down {
            color: #1565C0;
        }

        .modal-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .modal-stat {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .modal-stat .label {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        .modal-stat .value {
            font-size: 26px;
            font-weight: 800;
        }

        .modal-stats-mini {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 20px;
            padding: 12px 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .modal-stat-mini {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-stat-mini .label {
            font-size: 13px;
            color: var(--text-mid);
        }

        .modal-stat-mini .value {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .modal-charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .modal-charts.three-charts {
            grid-template-columns: repeat(3, 1fr);
        }

        .modal-analysis-row {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-box, .analysis-box {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
        }

        .analysis-title {
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 12px;
            color: var(--text-dark);
        }

        .analysis-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .vs-container {
            display: flex;
            align-items: stretch;
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            min-height: 180px;
        }

        .vs-side {
            flex: 1;
            padding: 20px 16px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .vs-side.support {
            background: linear-gradient(135deg, #EBF5FF, #DBEAFE);
        }

        .vs-side.oppose {
            background: linear-gradient(135deg, #FEF2F2, #FEE2E2);
        }

        .vs-label {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        .vs-side.support .vs-label {
            color: #fff;
            background: #3B82F6;
        }

        .vs-side.oppose .vs-label {
            color: #fff;
            background: #EF4444;
        }

        .vs-traits {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 10px;
        }

        .vs-trait {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .vs-trait-sub {
            font-size: 12px;
            color: var(--text-mid);
        }

        .vs-score {
            font-size: 13px;
            font-weight: 700;
            margin-top: 8px;
            padding: 4px 10px;
            border-radius: 8px;
            display: inline-block;
        }

        .vs-side.support .vs-score {
            color: #1D4ED8;
            background: rgba(59, 130, 246, 0.15);
        }

        .vs-side.oppose .vs-score {
            color: #B91C1C;
            background: rgba(239, 68, 68, 0.15);
        }

        .vs-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            background: linear-gradient(180deg, #f1f5f9, #e2e8f0);
            font-size: 14px;
            font-weight: 800;
            color: #64748b;
        }

        .chart-title {
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 12px;
            color: var(--text-dark);
        }

        .chart-container {
            height: 200px;
            position: relative;
        }

        .status-banner {
            margin-top: 24px;
            padding: 20px;
            border-radius: 16px;
        }

        .status-banner.danger {
            background: linear-gradient(135deg, #ffebee, #ffcdd2);
        }

        .status-banner.warning {
            background: linear-gradient(135deg, #fff3e0, #ffe0b2);
        }

        .status-banner.success {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
        }

        .status-banner h4 {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .status-banner p {
            font-size: 14px;
            color: var(--text-mid);
            line-height: 1.6;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            font-size: 12px;
            color: var(--text-light);
        }

        /* 변화 뱃지 - 상승 빨강, 하락 파랑 파스텔 */
        .change-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 12px;
            margin-top: 4px;
        }

        .change-badge.up {
            background: #FFCDD2;
            color: #C62828;
        }

        .change-badge.down {
            background: #BBDEFB;
            color: #1565C0;
        }

        .change-badge.same {
            background: #E0E0E0;
            color: #616161;
        }

        /* 슬로프 차트 섹션 */
        .slope-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            margin-bottom: 40px;
        }

        .slope-chart-container {
            position: relative;
            height: 600px;
            margin: 20px 0;
        }

        .slope-chart {
            display: flex;
            height: 100%;
        }

        .slope-axis {
            width: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 0;
        }

        .slope-axis.right {
            text-align: right;
        }

        .slope-axis-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .slope-axis-item:hover {
            background: #f0f0f0;
        }

        .slope-axis.right .slope-axis-item {
            flex-direction: row-reverse;
        }

        .slope-score {
            font-weight: 800;
            font-size: 14px;
            min-width: 40px;
        }

        .slope-score.positive { color: var(--positive); }
        .slope-score.negative { color: var(--negative); }

        .slope-region {
            font-weight: 500;
            color: var(--text-dark);
        }

        .slope-lines {
            flex: 1;
            position: relative;
        }

        .slope-line {
            position: absolute;
            height: 3px;
            transform-origin: left center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .slope-line:hover {
            height: 5px;
            filter: brightness(1.1);
        }

        .slope-line.up { background: linear-gradient(90deg, #66BB6A, #43A047); }
        .slope-line.down { background: linear-gradient(90deg, #EF5350, #E53935); }
        .slope-line.same { background: linear-gradient(90deg, #9E9E9E, #757575); }
        .slope-line.severe { background: linear-gradient(90deg, #B71C1C, #D32F2F); }

        .slope-legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .slope-legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .slope-legend-line {
            width: 30px;
            height: 4px;
            border-radius: 2px;
        }

        .slope-legend-line.up { background: #4CAF50; }
        .slope-legend-line.down { background: #F44336; }
        .slope-legend-line.severe { background: #B71C1C; }

        /* 모달 탭 */
        .modal-tabs {
            display: flex;
            gap: 4px;
            background: #f0f0f0;
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .modal-tab {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-mid);
        }

        .modal-tab.active {
            background: var(--card-bg);
            color: var(--text-dark);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .modal-tab:hover:not(.active) {
            color: var(--text-dark);
        }

        .modal-change-summary {
            background: linear-gradient(135deg, #f5f7fa, #e8ecef);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-change-arrow {

                    orientation: { '보수': -56, '중도': -34, '진보': -35 }
                }
            },
            {
                id: 'daegu', name: '대구광역시', governor: '공석', party: 'ppp',
                note: '4월 시장직 사퇴 (공석)',
                logo: 'governor_photos/daegu.png',
                governorPhoto: '',
                slogan: '글로벌 명품도시 대구',
                q1: {
                    positive: 49, negative: 39, netScore: 10, sample: 561,
                    ages: { '20대': 15, '30대': 13, '40대': 14, '50대': -2, '60대': 4, '70+': 23 },
                    orientation: { '보수': 39, '중도': -6, '진보': -43 }
                },
                q2: null // 공석
            },
            {
                id: 'sejong', name: '세종특별자치시', governor: '최민호', party: 'ppp',
                note: '표본수 부족',
                logo: 'governor_photos/sejong.png',
                governorPhoto: 'governor_photos/sejong_최민호.png',
                slogan: '행복도시 세종',
                q1: {
                    positive: 45, negative: 35, netScore: 10, sample: 156,
                    ages: { '20대': 15, '30대': 10, '40대': 5, '50대': 8, '60대': 12, '70+': 20 },
                    orientation: { '보수': 20, '중도': 10, '진보': -5 }
                },
                q2: null // 표본수 부족으로 미제시
            }
        ];

        // 지역 배치
        const leftRegions = ['seoul', 'incheon', 'gyeonggi', 'gangwon', 'chungbuk', 'chungnam', 'daejeon', 'sejong'];
        const rightRegions = ['busan', 'daegu', 'ulsan', 'gyeongbuk', 'gyeongnam', 'gwangju', 'jeonbuk', 'jeonnam', 'jeju'];

        // 시도 코드와 ID 매핑
        const codeToId = {
            '11': 'seoul', '21': 'busan', '22': 'daegu', '23': 'incheon',
            '24': 'gwangju', '25': 'daejeon', '26': 'ulsan', '29': 'sejong',
            '31': 'gyeonggi', '32': 'gangwon', '33': 'chungbuk', '34': 'chungnam',
            '35': 'jeonbuk', '36': 'jeonnam', '37': 'gyeongbuk', '38': 'gyeongnam', '39': 'jeju'
        };

        // 지역명 매핑
        const shortNames = {
            '서울특별시': '서울', '부산광역시': '부산', '대구광역시': '대구',
            '인천광역시': '인천', '광주광역시': '광주', '대전광역시': '대전',
            '울산광역시': '울산', '세종특별자치시': '세종', '경기도': '경기',
            '강원도': '강원', '충청북도': '충북', '충청남도': '충남',
            '전라북도': '전북', '전라남도': '전남', '경상북도': '경북',
            '경상남도': '경남', '제주특별자치도': '제주'
        };

        // 정당 색상
        const partyColors = { 'ppp': '#C93A40', 'dem': '#2E6EB5' };
        const partyColorsHover = { 'ppp': '#E04850', 'dem': '#3A8AD5' };

        // 변화량 계산
        function getChange(region) {
            if (!region.q1 || !region.q2) return null;
            return region.q2.netScore - region.q1.netScore;
        }

        // 현재 데이터 (하반기 우선, 없으면 상반기)
        function getCurrentData(region) {
            return region.q2 || region.q1;
        }

        // 지역 카드 생성 - 미니멀 + 정당색
        function createRegionCard(region) {
            const current = getCurrentData(region);
            if (!current) return '';

            const change = getChange(region);
            const changeClass = change > 0 ? 'up' : (change < 0 ? 'down' : 'same');
            const regionLogo = regionLogoMap[region.id] || '';

            return `
                <div class="region-card ${region.party}" onclick="openModal('${region.id}')">
                    <div class="card-logo-area">
                        <img class="region-logo-big" src="${regionLogo}" alt="${region.name}"
                             onerror="this.style.display='none'">
                    </div>
                    <div class="card-meta">
                        <span class="card-governor">${region.governor}</span>
                        <span class="card-score ${changeClass}">${current.netScore >= 0 ? '+' : ''}${current.netScore}</span>
                    </div>
                </div>
            `;
        }

        // 카드 렌더링
        function renderCards() {
            const leftContainer = document.getElementById('leftCards');
            const rightContainer = document.getElementById('rightCards');

            leftRegions.forEach(id => {
                const region = regionData.find(r => r.id === id);
                if (region) leftContainer.innerHTML += createRegionCard(region);
            });

            rightRegions.forEach(id => {
                const region = regionData.find(r => r.id === id);
                if (region) rightContainer.innerHTML += createRegionCard(region);
            });
        }

        // 순위 렌더링
        function renderRankings() {
            const grid = document.getElementById('rankingsGrid');
            // q2 데이터가 있는 지역만 필터링하고 정렬
            const validRegions = regionData.filter(r => r.q2 !== null);
            const sorted = [...validRegions].sort((a, b) => b.q2.netScore - a.q2.netScore);

            sorted.forEach((region, index) => {
                const rank = index + 1;
                const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-default';
                const current = region.q2;
                const scoreClass = current.netScore >= 20 ? 'high' : current.netScore >= 0 ? 'mid' : 'low';
                const change = getChange(region);

                let changeHtml = '';
                if (change !== null) {
                    const changeClass = change > 0 ? 'up' : (change < 0 ? 'down' : 'same');
                    const changeIcon = change > 0 ? '▲' : (change < 0 ? '▼' : '―');
                    changeHtml = `<span class="change-badge ${changeClass}" style="margin-left:8px;font-size:10px;">${changeIcon}${Math.abs(change)}</span>`;
                }

                const govPhoto = governorPhotoMap[region.governor] || '';
                grid.innerHTML += `
                    <div class="rank-card" onclick="openModal('${region.id}')">
                        <div class="rank-number ${rankClass}">${rank}</div>
                        <img class="rank-governor-photo" src="${govPhoto}" alt="${region.governor}">
                        <div class="rank-info">
                            <div class="rank-region">${region.name}${changeHtml}</div>
                            <div class="rank-governor">${region.governor} (${region.party === 'ppp' ? '국민의힘' : '민주당'})</div>
                        </div>
                        <div class="rank-score ${scoreClass}">${current.netScore >= 0 ? '+' : ''}${current.netScore}</div>
                    </div>
                `;
            });
        }

        // Modal
        let modalApprovalChart, modalAgeChart, modalOrientChart;
        let currentModalRegion = null;
        let currentModalQuarter = 'q2';

        function openModal(id) {
            const region = regionData.find(r => r.id === id);
            if (!region) return;

            currentModalRegion = region;
            // 하반기 데이터가 있으면 하반기, 없으면 상반기
            currentModalQuarter = region.q2 ? 'q2' : 'q1';

            const headerContent = document.getElementById('modalHeaderContent');
            headerContent.innerHTML = ``;

            document.getElementById('modalOverlay').classList.add('active');
            renderModalContent(region);
        }

        function renderModalContent(region) {
            const modalBody = document.getElementById('modalBody');
            const q1 = region.q1;
            const q2 = region.q2;
            const hasChange = q1 && q2;
            const current = currentModalQuarter === 'q2' && q2 ? q2 : q1;

            // 탭 HTML (상반기/하반기 둘 다 있을 때만)
            let tabsHtml = '';
            if (hasChange) {
                tabsHtml = `
                    <div class="modal-tabs">
                        <button class="modal-tab ${currentModalQuarter === 'q1' ? 'active' : ''}" onclick="switchModalTab('q1')">
                            상반기 (1~6월)
                        </button>
                        <button class="modal-tab ${currentModalQuarter === 'q2' ? 'active' : ''}" onclick="switchModalTab('q2')">
                            하반기 (7~12월)
                        </button>
                    </div>
                `;
            }

            const netScore = current.netScore;
            const statusClass = netScore < 0 ? 'danger' : netScore < 10 ? 'warning' : 'success';
            const statusTitle = netScore < 0 ? '위험 신호' : netScore < 10 ? '주의 필요' : '안정적';
            const statusMsg = netScore < 0
                ? '부정 평가가 긍정 평가를 앞서고 있습니다. 핵심 지지층 결집과 부정 여론 해소가 시급합니다.'
                : netScore < 10
                    ? '긍정과 부정이 팽팽합니다. 적극적인 민심 관리가 필요합니다.'
                    : '비교적 안정적인 지지율을 유지하고 있습니다.';

            const quarterLabel = currentModalQuarter === 'q2' ? '하반기' : '상반기';

            const neutral = 100 - current.positive - current.negative;

            // 단체장 사진 경로
            const governorPhoto = governorPhotoMap[region.governor] || '';

            // 점수 변화 HTML (별도 섹션)
            let changeSummaryHtml = '';
            if (hasChange) {
                const change = q2.netScore - q1.netScore;
                const changeClass = change > 0 ? 'up' : (change < 0 ? 'down' : 'same');
                const changeText = change > 0 ? `+${change}` : (change === 0 ? '±0' : change);
                const toClass = q2.netScore >= 0 ? 'positive' : 'negative';

                changeSummaryHtml = `
                    <div class="modal-change-summary">
                        <div class="modal-change-arrow">
                            <span class="from">${q1.netScore >= 0 ? '+' : ''}${q1.netScore}</span>
                            <span class="arrow">→</span>
                            <span class="to ${toClass}">${q2.netScore >= 0 ? '+' : ''}${q2.netScore}</span>
                        </div>
                        <div class="modal-change-delta ${changeClass}">
                            ${change > 0 ? '▲' : (change < 0 ? '▼' : '―')} ${changeText} (상반기 → 하반기)
                        </div>
                    </div>
                `;
            }

            modalBody.innerHTML = `
                <div class="modal-governor-section">
                    <img class="modal-governor-photo" src="${governorPhoto}" alt="${region.governor}">
                    <div class="modal-governor-info">
                        <div class="modal-governor-region">${region.name}</div>
                        <div class="modal-governor-name">${region.governor}</div>
                        <span class="modal-governor-party ${region.party}">${region.party === 'ppp' ? '국민의힘' : '더불어민주당'}</span>
                    </div>
                </div>

                ${changeSummaryHtml}
                ${tabsHtml}

                <div class="modal-stats-mini">
                    <div class="modal-stat-mini">
                        <span class="label">Net Score</span>
                        <span class="value" style="color:${netScore >= 0 ? 'var(--positive)' : 'var(--negative)'}">${netScore >= 0 ? '+' : ''}${netScore}</span>
                    </div>
                    <div class="modal-stat-mini">
                        <span class="label">표본수</span>
                        <span class="value">${current.sample.toLocaleString()}명</span>
                    </div>
                </div>

                <div class="modal-analysis-row">
                    <div class="chart-box">
                        <div class="chart-title">긍정/부정 평가 (${quarterLabel})</div>
                        <div class="chart-container">
                            <canvas id="modalApprovalChart"></canvas>
                        </div>
                    </div>
                    <div class="analysis-box">
                        <div class="analysis-title">직무수행 평가 집단 특성</div>
                        <div class="analysis-content" id="groupAnalysis"></div>
                    </div>
                </div>

                <div class="status-banner ${statusClass}">
                    <h4>${statusTitle} (${quarterLabel})</h4>
                    <p>${statusMsg}</p>
                </div>
            `;

            // Create charts
            setTimeout(() => {
                if (modalApprovalChart) modalApprovalChart.destroy();

                // 긍정/부정 파이차트 (긍정=파랑, 부정=빨강)
                const approvalCtx = document.getElementById('modalApprovalChart');
                modalApprovalChart = new Chart(approvalCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['긍정', '부정', '모름/무응답'],
                        datasets: [{
                            data: [current.positive, current.negative, neutral],
                            backgroundColor: ['#3B82F6', '#EF4444', '#9CA3AF'],
                            borderWidth: 2,
                            borderColor: '#fff',
                            hoverOffset: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        cutout: '55%',
                        plugins: {
                            legend: {
                                display: true,
                                position: 'bottom',
                                labels: {
                                    padding: 12,
                                    usePointStyle: true,
                                    pointStyle: 'circle',
                                    font: { size: 11, weight: '600' }
                                }
                            },
                            datalabels: {
                                color: '#fff',
                                font: { weight: 'bold', size: 12 },
                                formatter: (val) => val + '%'
                            }
                        }
                    }
                });

                // 집단 특성 분석 (연령대 + 정치성향 통합)
                const ageEntries = Object.entries(current.ages);
                const ageSorted = [...ageEntries].sort((a, b) => b[1] - a[1]);
                const topAge = ageSorted[0];
                const bottomAge = ageSorted[ageSorted.length - 1];

                const orientEntries = Object.entries(current.orientation);
                const orientSorted = [...orientEntries].sort((a, b) => b[1] - a[1]);
                const topOrient = orientSorted[0];
                const bottomOrient = orientSorted[orientSorted.length - 1];

                // 평균 Net Score 계산
                const avgSupportScore = Math.round((topAge[1] + topOrient[1]) / 2);
                const avgOpposeScore = Math.round((bottomAge[1] + bottomOrient[1]) / 2);

                document.getElementById('groupAnalysis').innerHTML = `
                    <div class="vs-container">
                        <div class="vs-side support">
                            <div class="vs-label">"잘하고 있다" 평가</div>
                            <div class="vs-traits">
                                <div class="vs-trait">${topAge[0]}</div>
                                <div class="vs-trait">${topOrient[0]} 성향</div>
                            </div>
                            <div class="vs-score">Net ${topAge[1] >= 0 ? '+' : ''}${topAge[1]} / ${topOrient[1] >= 0 ? '+' : ''}${topOrient[1]}</div>
                        </div>
                        <div class="vs-divider">VS</div>
                        <div class="vs-side oppose">
                            <div class="vs-label">"잘못하고 있다" 평가</div>
                            <div class="vs-traits">
                                <div class="vs-trait">${bottomAge[0]}</div>
                                <div class="vs-trait">${bottomOrient[0]} 성향</div>
                            </div>
                            <div class="vs-score">Net ${bottomAge[1] >= 0 ? '+' : ''}${bottomAge[1]} / ${bottomOrient[1] >= 0 ? '+' : ''}${bottomOrient[1]}</div>
                        </div>
                    </div>
                `;
            }, 100);
        }

        function switchModalTab(quarter) {
            if (!currentModalRegion) return;
            currentModalQuarter = quarter;
            renderModalContent(currentModalRegion);
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) closeModal();
        });

        // D3.js로 지도 렌더링 (제주도 포함되도록 조정)
        async function renderMap() {
            const width = 480;
            const height = 660;

            const svg = d3.select('#mapContainer')
                .append('svg')
                .attr('class', 'korea-map')
                .attr('viewBox', `0 0 ${width} ${height}`)
                .attr('preserveAspectRatio', 'xMidYMid meet');

            try {
                const response = await fetch('https://raw.githubusercontent.com/southkorea/southkorea-maps/master/kostat/2018/json/skorea-provinces-2018-topo-simple.json');
                const topoData = await response.json();

                let geojson = topojson.feature(topoData, topoData.objects.skorea_provinces_2018_geo);

                // 제주도가 보이도록 중심점과 스케일 조정
                const projection = d3.geoMercator()
                    .center([127.5, 35.5])
                    .scale(4800)
                    .translate([width / 2, height / 2]);

                const path = d3.geoPath().projection(projection);

                // 작은 섬들 필터링 (메인 영토만 유지)
                const minArea = 50;
                geojson.features = geojson.features.map(feature => {
                    if (feature.geometry.type === 'MultiPolygon') {
                        const filtered = feature.geometry.coordinates
                            .filter(polygon => {
                                const area = path.area({ type: 'Feature', geometry: { type: 'Polygon', coordinates: polygon } });
                                return area > minArea;
                            })
                            .sort((a, b) => {
                                const areaA = path.area({ type: 'Feature', geometry: { type: 'Polygon', coordinates: a } });
                                const areaB = path.area({ type: 'Feature', geometry: { type: 'Polygon', coordinates: b } });
                                return areaB - areaA;
                            })
                            .slice(0, 3);
                        feature.geometry.coordinates = filtered.length ? filtered : feature.geometry.coordinates.slice(0, 1);
                    }
                    return feature;
                });

                // 지도 그리기
                svg.selectAll('path')
                    .data(geojson.features)
                    .enter()
                    .append('path')
                    .attr('d', path)
                    .attr('id', d => 'map-' + codeToId[d.properties.code])
                    .style('fill', d => {
                        const id = codeToId[d.properties.code];
                        const region = regionData.find(r => r.id === id);
                        return region ? partyColors[region.party] : '#ccc';
                    })
                    .style('stroke', '#ffffff')
                    .style('stroke-width', '2px')
                    .style('cursor', 'pointer')
                    .style('transition', 'fill 0.2s')
                    .on('mouseover', function(event, d) {
                        const id = codeToId[d.properties.code];
                        const region = regionData.find(r => r.id === id);
                        d3.select(this).style('fill', region ? partyColorsHover[region.party] : '#ddd');
                    })
                    .on('mouseout', function(event, d) {
                        const id = codeToId[d.properties.code];
                        const region = regionData.find(r => r.id === id);
                        d3.select(this).style('fill', region ? partyColors[region.party] : '#ccc');
                    })
                    .on('click', function(event, d) {
                        const id = codeToId[d.properties.code];
                        if (id) openModal(id);
                    });

                // 지역명 라벨 + Net Score
                const labels = svg.selectAll('g.label')
                    .data(geojson.features)
                    .enter()
                    .append('g')
                    .attr('class', 'label')
                    .attr('transform', d => {
                        const centroid = path.centroid(d);
                        return `translate(${centroid[0]}, ${centroid[1]})`;
                    })
                    .style('pointer-events', 'none');

                // 지역명만 표시
                labels.append('text')
                    .attr('text-anchor', 'middle')
                    .style('font-size', '14px')
                    .style('font-weight', '700')
                    .style('fill', '#ffffff')
                    .style('text-shadow', '1px 1px 3px rgba(0,0,0,0.6)')
                    .text(d => shortNames[d.properties.name] || d.properties.name);

            } catch (error) {
                console.error('지도 로딩 실패:', error);
                document.getElementById('mapContainer').innerHTML = '<p style="text-align:center;padding:50px;color:#999;">지도 로딩 중 오류가 발생했습니다.</p>';
            }
        }
        // Initialize
        renderCards();
        renderRankings();
        renderMap();
    </script>
</body>
</html>
