<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="살롱페이 - 미용실 선불 잔액 관리 서비스">
    <meta name="google-adsense-account" content="ca-pub-2262917513137602">
    <title>살롱페이 - Salon Pay</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #FFD93D 0%, #FF9F45 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* 헤더 */
        .header {
            background: linear-gradient(135deg, #FFD93D 0%, #FF9F45 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .logo {
            margin-bottom: 10px;
        }

        .logo img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        /* 컨텐츠 영역 */
        .content {
            padding: 30px 25px;
        }

        /* 화면 전환 */
        .screen { display: none; }
        .screen.active { display: block; }

        /* 입력 필드 */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1.1rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #FFB347;
        }

        .input-group input.large {
            font-size: 2rem;
            text-align: center;
            letter-spacing: 10px;
            font-weight: 700;
        }

        /* 버튼 */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: linear-gradient(135deg, #FFD93D 0%, #FF9F45 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 159, 69, 0.4);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(255, 159, 69, 0.5);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            margin-top: 10px;
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }

        .btn-small {
            padding: 10px 20px;
            font-size: 0.95rem;
            width: auto;
        }

        /* 잔액 카드 */
        .balance-card {
            background: linear-gradient(135deg, #FFD93D 0%, #FF9F45 100%);
            color: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(255, 159, 69, 0.3);
        }

        .balance-card .label {
            font-size: 0.95rem;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .balance-card .amount {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .balance-card .customer-name {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.3);
            font-size: 1.1rem;
        }

        /* 쿠폰 카드 */
        .coupon-card {
            background: linear-gradient(135deg, #FFE066 0%, #FFD93D 100%);
            color: #5D4E37;
            border-radius: 16px;
            padding: 20px;
            padding-right: 100px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .coupon-card::before {
            content: '';
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 80px;
            height: 80px;
            background: url('birthday.png') no-repeat center;
            background-size: contain;
        }

        .coupon-card .coupon-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .coupon-card .coupon-desc {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* 거래 내역 */
        .history-section h3 {
            font-size: 1rem;
            color: #666;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-item .info {
            display: flex;
            flex-direction: column;
        }

        .history-item .service {
            font-weight: 500;
            color: #333;
        }

        .history-item .date {
            font-size: 0.85rem;
            color: #999;
        }

        .history-item .amount {
            font-weight: 700;
        }

        .history-item .amount.plus {
            color: #11998e;
        }

        .history-item .amount.minus {
            color: #eb3349;
        }

        /* 모드 선택 */
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .mode-btn {
            flex: 1;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            background: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .mode-btn:hover {
            border-color: #FFB347;
        }

        .mode-btn .icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .mode-btn .text {
            font-weight: 600;
            color: #333;
        }

        /* 관리자 대시보드 */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .admin-header h2 {
            font-size: 1.3rem;
            color: #333;
        }

        .customer-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .customer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .customer-item:hover {
            background: #e9ecef;
        }

        .customer-item .info h4 {
            font-size: 1rem;
            margin-bottom: 3px;
        }

        .customer-item .info p {
            font-size: 0.85rem;
            color: #666;
        }

        .customer-item .balance {
            font-weight: 700;
            color: #FF9F45;
        }

        /* 모달 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 380px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 1.2rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }

        /* 빠른 금액 버튼 */
        .quick-amounts {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .quick-amount-btn {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .quick-amount-btn:hover {
            border-color: #FFB347;
            background: #FFF8E7;
        }

        /* 탭 */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            background: #f0f0f0;
            padding: 5px;
            border-radius: 12px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: transparent;
            cursor: pointer;
            font-weight: 500;
            font-family: inherit;
            transition: all 0.2s;
        }

        .tab.active {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* 메시지 */
        .message {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: center;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        /* 로딩 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f0f0f0;
            border-top-color: #FF9F45;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 하단 네비게이션 */
        .bottom-nav {
            display: flex;
            border-top: 1px solid #eee;
        }

        .nav-item {
            flex: 1;
            padding: 15px;
            border: none;
            background: white;
            cursor: pointer;
            text-align: center;
            font-family: inherit;
            transition: background 0.2s;
        }

        .nav-item:hover {
            background: #f5f5f5;
        }

        .nav-item .icon {
            font-size: 1.3rem;
            margin-bottom: 3px;
        }

        .nav-item .text {
            font-size: 0.75rem;
            color: #666;
        }

        .nav-item.active .text {
            color: #FF9F45;
            font-weight: 600;
        }

        /* 빈 상태 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        /* 서비스 가격표 */
        .price-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .price-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .price-item .service-name {
            font-weight: 500;
        }

        .price-item .service-price {
            font-weight: 700;
            color: #FF9F45;
        }

        .price-item .service-actions {
            display: flex;
            gap: 8px;
        }

        .price-item .service-actions button {
            padding: 5px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-edit {
            background: #ffc107;
            color: #333;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        /* AI 리마인더 카드 */
        .reminder-card {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .reminder-card .reminder-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .reminder-card .reminder-desc {
            font-size: 0.9rem;
            opacity: 0.95;
        }

        /* 생일 고객 배지 */
        .birthday-badge {
            background: #f093fb;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            margin-left: 8px;
        }

        /* 쿠폰 관리 */
        .coupon-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .coupon-status.active {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .coupon-status.used {
            background: #ffebee;
            color: #c62828;
        }

        .coupon-status.none {
            background: #f5f5f5;
            color: #999;
        }

        /* 가격표 버튼 */
        .btn-outline {
            background: white;
            border: 2px solid #FFB347;
            color: #FF9F45;
            margin-top: 10px;
        }

        .btn-outline:hover {
            background: #FFF8E7;
        }

        /* 관리자 이용내역 아이템 */
        .history-item-admin {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .history-item-admin .history-info {
            flex: 1;
        }

        .history-item-admin .history-service {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .history-item-admin .history-date {
            font-size: 0.8rem;
            color: #999;
        }

        .history-item-admin .history-amount {
            font-weight: 700;
            margin-right: 10px;
        }

        .history-item-admin .history-amount.plus {
            color: #11998e;
        }

        .history-item-admin .history-amount.minus {
            color: #eb3349;
        }

        .history-item-admin .history-actions {
            display: flex;
            gap: 5px;
        }

        .history-item-admin .history-actions button {
            padding: 5px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* 서비스 입력 폼 */
        .service-form {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .service-form input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
        }

        .service-form input:focus {
            outline: none;
            border-color: #FFB347;
        }

        .service-form button {
            padding: 12px 20px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 메인 화면: 모드 선택 -->
    <div id="screen-home" class="screen active">
        <div class="header">
            <div class="logo"><img src="logo.png" alt="살롱페이"></div>
            <h1>살롱페이</h1>
            <p>미용실 선불 잔액 관리</p>
        </div>
        <div class="content">
            <div class="mode-selector">
                <div class="mode-btn" onclick="showScreen('customer-login')">
                    <div class="icon">👤</div>
                    <div class="text">고객 조회</div>
                </div>
                <div class="mode-btn" onclick="showScreen('admin-login')">
                    <div class="icon">🔐</div>
                    <div class="text">관리자</div>
                </div>
            </div>
            <p style="text-align:center; color:#999; font-size:0.9rem;">
                이름과 전화번호 뒷자리로<br>간편하게 잔액을 확인하세요
            </p>
        </div>
    </div>

    <!-- 고객 로그인 -->
    <div id="screen-customer-login" class="screen">
        <div class="header">
            <div class="logo"><img src="logo.png" alt="살롱페이"></div>
            <h1>잔액 조회</h1>
            <p>이름과 전화번호 뒷자리를 입력하세요</p>
        </div>
        <div class="content">
            <div id="customer-login-message"></div>
            <div class="input-group">
                <label>이름</label>
                <input type="text" id="customer-name" placeholder="홍길동">
            </div>
            <div class="input-group">
                <label>전화번호 뒷자리 4자리</label>
                <input type="tel" id="phone-last4" class="large" maxlength="4" placeholder="0000" inputmode="numeric">
            </div>
            <button class="btn btn-primary" onclick="customerLogin()">조회하기</button>
            <button class="btn btn-secondary" onclick="showScreen('home')">← 돌아가기</button>
        </div>
    </div>

    <!-- 고객 잔액 화면 -->
    <div id="screen-customer-balance" class="screen">
        <div class="content" style="padding-top:20px;">
            <div class="balance-card">
                <div class="label">💰 내 잔액</div>
                <div class="amount" id="customer-balance">0원</div>
                <div class="customer-name" id="customer-name-display">고객님</div>
            </div>

            <div id="reminder-container">
                <!-- AI 리마인더가 여기에 표시 -->
            </div>

            <div id="coupon-container">
                <!-- 쿠폰이 있으면 여기에 표시 -->
            </div>

            <div class="history-section">
                <h3>📋 이용 내역</h3>
                <div class="history-list" id="customer-history">
                    <div class="loading">
                        <div class="spinner"></div>
                        불러오는 중...
                    </div>
                </div>
            </div>

            <button class="btn btn-outline" onclick="showModal('price-list')">💇 서비스 가격표 보기</button>
            <button class="btn btn-secondary" onclick="customerLogout()">← 로그아웃</button>
        </div>
    </div>

    <!-- 관리자 로그인 -->
    <div id="screen-admin-login" class="screen">
        <div class="header">
            <div class="logo"><img src="logo.png" alt="살롱페이"></div>
            <h1>관리자 로그인</h1>
            <p>비밀번호를 입력하세요</p>
        </div>
        <div class="content">
            <div id="admin-login-message"></div>
            <div class="input-group">
                <input type="password" id="admin-password" placeholder="비밀번호" class="large">
            </div>
            <button class="btn btn-primary" onclick="adminLogin()">로그인</button>
            <button class="btn btn-secondary" onclick="showScreen('home')">← 돌아가기</button>
        </div>
    </div>

    <!-- 관리자 대시보드 -->
    <div id="screen-admin-dashboard" class="screen">
        <div class="content" style="padding-top:20px;">
            <div class="admin-header">
                <h2>👨‍💼 고객 관리</h2>
                <button class="btn btn-primary btn-small" onclick="showModal('add-customer')">+ 고객 등록</button>
            </div>

            <div class="input-group" style="margin-bottom:15px;">
                <input type="tel" id="admin-search" placeholder="🔍 전화번호로 검색..." oninput="searchCustomers()">
            </div>

            <div class="customer-list" id="admin-customer-list">
                <div class="loading">
                    <div class="spinner"></div>
                    불러오는 중...
                </div>
            </div>
        </div>
        <div class="bottom-nav">
            <button class="nav-item active">
                <div class="icon">👥</div>
                <div class="text">고객</div>
            </button>
            <button class="nav-item" onclick="showModal('service-manage')">
                <div class="icon">💇</div>
                <div class="text">서비스</div>
            </button>
            <button class="nav-item" onclick="showModal('birthday-manage')">
                <div class="icon">🎂</div>
                <div class="text">생일쿠폰</div>
            </button>
            <button class="nav-item" onclick="showModal('settings')">
                <div class="icon">⚙️</div>
                <div class="text">설정</div>
            </button>
            <button class="nav-item" onclick="adminLogout()">
                <div class="icon">🚪</div>
                <div class="text">나가기</div>
            </button>
        </div>
    </div>
</div>

<!-- 고객 등록 모달 -->
<div id="modal-add-customer" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>👤 새 고객 등록</h3>
            <button class="modal-close" onclick="hideModal('add-customer')">&times;</button>
        </div>
        <div class="input-group">
            <label>이름</label>
            <input type="text" id="new-customer-name" placeholder="홍길동">
        </div>
        <div class="input-group">
            <label>전화번호</label>

<script>
    // Firebase 설정 - 나중에 실제 값으로 교체
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Firebase 초기화 (설정 후 주석 해제)
    // firebase.initializeApp(firebaseConfig);
    // const db = firebase.firestore();

    // 서비스 목록 데이터
    let mockServices = [
        { id: '1', name: '주니어 컷', price: 15000, category: 'cut' },
        { id: '2', name: '남성 컷', price: 18000, category: 'cut' },
        { id: '3', name: '여성 컷', price: 21000, category: 'cut' },
        { id: '4', name: '일반펌', price: 70000, category: 'perm' },
        { id: '5', name: '열펌', price: 100000, category: 'perm' },
        { id: '6', name: '뿌리염색', price: 50000, category: 'color' },
        { id: '7', name: '전체염색', price: 70000, category: 'color' },
    ];

    // 임시 데이터 (Firebase 연결 전 테스트용)
    let mockCustomers = [
        { id: '1', name: '김민지(테스트)', phone: '010-1234-5678', lastFour: '5678', balance: 150000, birthday: '1995-03-15', birthdayCoupon: null, history: [
            { date: '2026-02-20', type: 'use', amount: -21000, service: '여성 컷' },
            { date: '2026-02-15', type: 'charge', amount: 100000, service: '충전' },
            { date: '2026-02-10', type: 'use', amount: -70000, service: '전체염색' },
        ]},
        { id: '2', name: '이서준(테스트)', phone: '010-9876-5432', lastFour: '5432', balance: 82000, birthday: '1990-07-22', birthdayCoupon: null, history: [
            { date: '2026-02-18', type: 'use', amount: -18000, service: '남성 컷' },
            { date: '2026-02-01', type: 'charge', amount: 100000, service: '충전' },
        ]},
        { id: '3', name: '박지영(테스트)', phone: '010-5555-1234', lastFour: '1234', balance: 250000, birthday: '1988-02-03', birthdayCoupon: 'active', history: [
            { date: '2026-02-19', type: 'charge', amount: 300000, service: '충전' },
            { date: '2026-02-19', type: 'use', amount: -50000, service: '뿌리염색' },
        ]},
    ];

    let currentCustomer = null;
    let selectedCustomer = null;
    const ADMIN_PASSWORD = '1234'; // 기본 비밀번호

    // 화면 전환
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + screenId).classList.add('active');

        // 화면별 초기화
        if (screenId === 'customer-login') {
            document.getElementById('customer-name').value = '';
            document.getElementById('phone-last4').value = '';
            document.getElementById('customer-name').focus();
        } else if (screenId === 'admin-login') {
            document.getElementById('admin-password').value = '';
            document.getElementById('admin-password').focus();
        } else if (screenId === 'admin-dashboard') {
            loadCustomerList();
        }
    }

    // 고객 로그인
    function customerLogin() {
        const name = document.getElementById('customer-name').value.trim();
        const lastFour = document.getElementById('phone-last4').value;
        const msgDiv = document.getElementById('customer-login-message');

        if (!name) {
            msgDiv.innerHTML = '<div class="message error">이름을 입력하세요</div>';
            return;
        }

        if (lastFour.length !== 4) {
            msgDiv.innerHTML = '<div class="message error">전화번호 뒷자리 4자리를 입력하세요</div>';
            return;
        }

        // 고객 찾기 (이름 + 뒷자리 4자리 모두 일치)
        const customer = mockCustomers.find(c => c.lastFour === lastFour && c.name === name);

        if (!customer) {
            msgDiv.innerHTML = '<div class="message error">일치하는 고객 정보가 없습니다</div>';
            return;
        }

        currentCustomer = customer;
        displayCustomerBalance();
        showScreen('customer-balance');
    }

    // 고객 잔액 표시
    function displayCustomerBalance() {
        document.getElementById('customer-balance').textContent = currentCustomer.balance.toLocaleString() + '원';
        document.getElementById('customer-name-display').textContent = currentCustomer.name + ' 고객님';

        // AI 리마인더 표시
        displayAIReminder();

        // 쿠폰 체크 (생일)
        const couponContainer = document.getElementById('coupon-container');
        const today = new Date();
        const birthday = new Date(currentCustomer.birthday);
        const couponSettings = getBirthdayCouponSettings();

        if (couponSettings.enabled && today.getMonth() === birthday.getMonth() && currentCustomer.birthdayCoupon === 'active') {
            couponContainer.innerHTML = `
                <div class="coupon-card">
                    <div class="coupon-title">🎂 생일 축하 쿠폰</div>
                    <div class="coupon-desc">${couponSettings.description} (이번 달까지)</div>
                </div>
            `;
        } else {
            couponContainer.innerHTML = '';
        }

        // 이용 내역
        const historyDiv = document.getElementById('customer-history');
        if (currentCustomer.history && currentCustomer.history.length > 0) {
            historyDiv.innerHTML = currentCustomer.history.map(h => `
                <div class="history-item">
                    <div class="info">
                        <span class="service">${h.service}</span>
                        <span class="date">${h.date}</span>
                    </div>
                    <span class="amount ${h.amount > 0 ? 'plus' : 'minus'}">
                        ${h.amount > 0 ? '+' : ''}${h.amount.toLocaleString()}원
                    </span>
                </div>
            `).join('');
        } else {
            historyDiv.innerHTML = '<div class="empty-state"><div class="icon">📝</div>이용 내역이 없습니다</div>';
        }
    }

    // AI 리마인더 계산 및 표시
    function displayAIReminder() {
        const reminderContainer = document.getElementById('reminder-container');
        const history = currentCustomer.history || [];

        // 마지막 서비스 찾기 (충전 제외)
        const lastService = history.find(h => h.type === 'use');

        if (!lastService) {
            reminderContainer.innerHTML = '';
            return;
        }

        const lastDate = new Date(lastService.date);
        const today = new Date();
        const daysSince = Math.floor((today - lastDate) / (1000 * 60 * 60 * 24));

        // 서비스 유형에 따른 추천 주기 계산
        let recommendDays = 30; // 기본 30일
        let serviceType = '시술';

        if (lastService.service.includes('컷')) {
            recommendDays = 35; // 컷은 5주
            serviceType = '커트';
        } else if (lastService.service.includes('염색')) {
            recommendDays = 45; // 염색은 6주
            serviceType = '염색';
        } else if (lastService.service.includes('펌')) {
            recommendDays = 90; // 펌은 3개월
            serviceType = '펌';
        }

        const nextDate = new Date(lastDate);
        nextDate.setDate(nextDate.getDate() + recommendDays);
        const daysUntil = Math.floor((nextDate - today) / (1000 * 60 * 60 * 24));

        let message = '';
        if (daysUntil <= 0) {
            message = `${serviceType} 하신 지 ${daysSince}일이 지났어요. 새로운 스타일로 변신할 때가 됐어요! ✨`;
        } else if (daysUntil <= 7) {
            message = `${serviceType} 예약하실 때가 다가왔어요! ${daysUntil}일 후면 추천 방문일이에요. 💇`;
        } else {
            message = `마지막 ${serviceType}: ${daysSince}일 전 | 다음 추천 방문: ${daysUntil}일 후`;
        }

        reminderContainer.innerHTML = `
            <div class="reminder-card">
                <div class="reminder-title">🤖 AI 스타일 리마인더</div>
                <div class="reminder-desc">${message}</div>
            </div>
        `;
    }

    // 고객 로그아웃
    function customerLogout() {
        currentCustomer = null;
        showScreen('home');
    }

    // 관리자 로그인
    function adminLogin() {
        const password = document.getElementById('admin-password').value;
        const msgDiv = document.getElementById('admin-login-message');

        if (password === ADMIN_PASSWORD) {
            showScreen('admin-dashboard');
        } else {
            msgDiv.innerHTML = '<div class="message error">비밀번호가 틀렸습니다</div>';
        }
    }

    // 관리자 로그아웃
    function adminLogout() {
        showScreen('home');
    }

    // 고객 목록 로드
    function loadCustomerList() {
        const listDiv = document.getElementById('admin-customer-list');

        if (mockCustomers.length === 0) {
            listDiv.innerHTML = '<div class="empty-state"><div class="icon">👥</div>등록된 고객이 없습니다</div>';
            return;
        }

        listDiv.innerHTML = mockCustomers.map(c => `
            <div class="customer-item" onclick="openCustomerDetail('${c.id}')">
                <div class="info">
                    <h4>${c.name}</h4>
                    <p>${c.phone}</p>
                </div>
                <div class="balance">${c.balance.toLocaleString()}원</div>
            </div>
        `).join('');
    }

    // 고객 검색
    function searchCustomers() {
        const query = document.getElementById('admin-search').value.replace(/-/g, '');
        const listDiv = document.getElementById('admin-customer-list');

        const filtered = mockCustomers.filter(c =>
            c.phone.replace(/-/g, '').includes(query) || c.name.includes(query)
        );

        if (filtered.length === 0) {
            listDiv.innerHTML = '<div class="empty-state"><div class="icon">🔍</div>검색 결과가 없습니다</div>';
            return;
        }

        listDiv.innerHTML = filtered.map(c => `
            <div class="customer-item" onclick="openCustomerDetail('${c.id}')">
                <div class="info">
                    <h4>${c.name}</h4>
                    <p>${c.phone}</p>
                </div>
                <div class="balance">${c.balance.toLocaleString()}원</div>
            </div>
        `).join('');
    }

    // 모달 표시/숨김
    function showModal(modalId) {
        document.getElementById('modal-' + modalId).classList.add('active');
    }

    function hideModal(modalId) {
        document.getElementById('modal-' + modalId).classList.remove('active');
    }

    // 고객 상세 열기
    function openCustomerDetail(customerId) {
        selectedCustomer = mockCustomers.find(c => c.id === customerId);
        document.getElementById('detail-customer-name').textContent = selectedCustomer.name;
        document.getElementById('detail-customer-balance').textContent = selectedCustomer.balance.toLocaleString() + '원';
        document.getElementById('charge-amount').value = '';
        document.getElementById('use-amount').value = '';
        document.getElementById('service-select').value = '';
        document.getElementById('use-memo').value = '';
        loadAdminCustomerHistory();
        showModal('customer-detail');
    }

    // 관리자용 고객 이용 내역 로드
    function loadAdminCustomerHistory() {
        const historyDiv = document.getElementById('admin-customer-history');

        if (!selectedCustomer.history || selectedCustomer.history.length === 0) {
            historyDiv.innerHTML = '<div class="empty-state"><div class="icon">📝</div>이용 내역이 없습니다</div>';
            return;
        }

        historyDiv.innerHTML = selectedCustomer.history.map((h, index) => `
            <div class="history-item-admin">
                <div class="history-info">
                    <div class="history-service">${h.service}</div>
                    <div class="history-date">${h.date}</div>
                </div>
                <span class="history-amount ${h.amount > 0 ? 'plus' : 'minus'}">
                    ${h.amount > 0 ? '+' : ''}${h.amount.toLocaleString()}원
                </span>
                <div class="history-actions">
                    <button class="btn-edit" onclick="editHistory(${index})">수정</button>
                    <button class="btn-delete" onclick="deleteHistory(${index})">삭제</button>
                </div>
            </div>
        `).join('');
    }

    // 이용 내역 수정
    function editHistory(index) {
        const history = selectedCustomer.history[index];

        const newService = prompt('서비스명:', history.service);
        if (newService === null) return;

        const newAmount = prompt('금액 (차감은 음수로 입력):', history.amount);
        if (newAmount === null) return;

        const oldAmount = history.amount;
        const parsedAmount = parseInt(newAmount);

        // 잔액 조정 (기존 금액 복구 후 새 금액 적용)
        selectedCustomer.balance -= oldAmount; // 기존 금액 복구
        selectedCustomer.balance += parsedAmount; // 새 금액 적용

        history.service = newService || history.service;
        history.amount = parsedAmount;

        // UI 업데이트
        document.getElementById('detail-customer-balance').textContent = selectedCustomer.balance.toLocaleString() + '원';
        loadAdminCustomerHistory();
        loadCustomerList();

        alert('내역이 수정되었습니다!');
    }

    // 이용 내역 삭제
    function deleteHistory(index) {
        if (!confirm('정말 삭제하시겠습니까? 잔액도 함께 조정됩니다.')) return;

        const history = selectedCustomer.history[index];

        // 잔액 조정 (삭제되는 금액만큼 복구)
        selectedCustomer.balance -= history.amount;

        // 내역 삭제
        selectedCustomer.history.splice(index, 1);

        // UI 업데이트
        document.getElementById('detail-customer-balance').textContent = selectedCustomer.balance.toLocaleString() + '원';
        loadAdminCustomerHistory();
        loadCustomerList();

        alert('내역이 삭제되었습니다!');
    }

    // 탭 전환
    function switchTab(tabName) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');

        event.target.classList.add('active');
        document.getElementById('tab-' + tabName).style.display = 'block';
    }

    // 빠른 금액 설정
    function setAmount(amount) {
        document.getElementById('charge-amount').value = amount;
    }

    // 서비스 금액 업데이트
    function updateServiceAmount() {
        const select = document.getElementById('service-select');
        const amountInput = document.getElementById('use-amount');

        if (select.value && select.value !== 'custom') {
            amountInput.value = select.value;
        } else {
            amountInput.value = '';
            amountInput.focus();
        }
    }

    // 충전
    function chargeBalance() {
        const amount = parseInt(document.getElementById('charge-amount').value);

        if (!amount || amount <= 0) {
            alert('충전 금액을 입력하세요');
            return;
        }

        selectedCustomer.balance += amount;
        selectedCustomer.history.unshift({
            date: new Date().toISOString().split('T')[0],
            type: 'charge',
            amount: amount,
            service: '충전'
        });

        document.getElementById('detail-customer-balance').textContent = selectedCustomer.balance.toLocaleString() + '원';
        loadCustomerList();

        alert(`${amount.toLocaleString()}원이 충전되었습니다!`);
        document.getElementById('charge-amount').value = '';
    }

    // 차감
    function useBalance() {
        const amount = parseInt(document.getElementById('use-amount').value);
        const memo = document.getElementById('use-memo').value;
        const serviceSelect = document.getElementById('service-select');
        const selectedOption = serviceSelect.options[serviceSelect.selectedIndex];
        const serviceName = selectedOption?.dataset?.serviceName || selectedOption?.text.split(' - ')[0] || memo || '서비스';

        if (!amount || amount <= 0) {
            alert('차감 금액을 입력하세요');
            return;
        }

        if (selectedCustomer.balance < amount) {
            alert('잔액이 부족합니다!');
            return;
        }

        selectedCustomer.balance -= amount;
        selectedCustomer.history.unshift({
            date: new Date().toISOString().split('T')[0],
            type: 'use',
            amount: -amount,
            service: serviceName
        });

        document.getElementById('detail-customer-balance').textContent = selectedCustomer.balance.toLocaleString() + '원';
        loadCustomerList();

        alert(`${amount.toLocaleString()}원이 차감되었습니다!`);
        document.getElementById('use-amount').value = '';
        document.getElementById('service-select').value = '';
        document.getElementById('use-memo').value = '';
    }

    // 고객 등록
    function addCustomer() {
        const name = document.getElementById('new-customer-name').value.trim();
        const phone = document.getElementById('new-customer-phone').value.trim();
        const birthday = document.getElementById('new-customer-birthday').value;
        const balance = parseInt(document.getElementById('new-customer-balance').value) || 0;

        if (!name || !phone) {
            alert('이름과 전화번호를 입력하세요');
            return;
        }

        const lastFour = phone.replace(/-/g, '').slice(-4);

        // 중복 체크
        if (mockCustomers.some(c => c.lastFour === lastFour)) {
            alert('이미 등록된 전화번호입니다');
            return;
        }

        const newCustomer = {
            id: Date.now().toString(),
            name: name,
            phone: phone,
            lastFour: lastFour,
            balance: balance,
            birthday: birthday,
            history: balance > 0 ? [{
                date: new Date().toISOString().split('T')[0],
                type: 'charge',
                amount: balance,
                service: '초기 충전'
            }] : []
        };

        mockCustomers.unshift(newCustomer);
        loadCustomerList();
        hideModal('add-customer');

        // 입력 초기화
        document.getElementById('new-customer-name').value = '';
        document.getElementById('new-customer-phone').value = '';
        document.getElementById('new-customer-birthday').value = '';
        document.getElementById('new-customer-balance').value = '0';

        alert(`${name} 고객님이 등록되었습니다!`);
    }

    // 설정 저장
    function saveSettings() {
        const salonName = document.getElementById('setting-salon-name').value;
        const newPassword = document.getElementById('setting-new-password').value;

        if (salonName) {
            localStorage.setItem('salonName', salonName);
        }

        if (newPassword) {
            // 실제로는 Firebase에 저장
            alert('비밀번호가 변경되었습니다');
        }

        hideModal('settings');
        alert('설정이 저장되었습니다!');
    }

    // 서비스 목록 로드 (관리자용)
    function loadServiceList() {
        const listDiv = document.getElementById('admin-service-list');

        if (mockServices.length === 0) {
            listDiv.innerHTML = '<div class="empty-state"><div class="icon">💇</div>등록된 서비스가 없습니다</div>';
            return;
        }

        listDiv.innerHTML = mockServices.map(s => `
            <div class="price-item">
                <span class="service-name">${s.name}</span>
                <span class="service-price">${s.price.toLocaleString()}원</span>
                <div class="service-actions">
                    <button class="btn-edit" onclick="editService('${s.id}')">수정</button>
                    <button class="btn-delete" onclick="deleteService('${s.id}')">삭제</button>
                </div>
            </div>
        `).join('');
    }

    // 서비스 추가
    function addService() {
        const name = document.getElementById('new-service-name').value.trim();
        const price = parseInt(document.getElementById('new-service-price').value);

        if (!name || !price) {
            alert('서비스명과 가격을 입력하세요');
            return;
        }

        const newService = {
            id: Date.now().toString(),
            name: name,
            price: price,
            category: 'custom'
        };

        mockServices.push(newService);
        loadServiceList();
        updateServiceSelect();

        document.getElementById('new-service-name').value = '';
        document.getElementById('new-service-price').value = '';

        alert(`${name} 서비스가 추가되었습니다!`);
    }

    // 서비스 수정
    function editService(serviceId) {
        const service = mockServices.find(s => s.id === serviceId);
        const newName = prompt('서비스명:', service.name);
        if (newName === null) return;

        const newPrice = prompt('가격:', service.price);
        if (newPrice === null) return;

        service.name = newName || service.name;
        service.price = parseInt(newPrice) || service.price;

        loadServiceList();
        updateServiceSelect();
        alert('서비스가 수정되었습니다!');
    }

    // 서비스 삭제
    function deleteService(serviceId) {
        if (!confirm('정말 삭제하시겠습니까?')) return;

        mockServices = mockServices.filter(s => s.id !== serviceId);
        loadServiceList();
        updateServiceSelect();
        alert('서비스가 삭제되었습니다!');
    }

    // 서비스 선택 드롭다운 업데이트
    function updateServiceSelect() {
        const select = document.getElementById('service-select');
        select.innerHTML = '<option value="">서비스 선택...</option>';

        mockServices.forEach(s => {
            const option = document.createElement('option');
            option.value = s.price;
            option.textContent = `${s.name} - ${s.price.toLocaleString()}원`;
            option.dataset.serviceName = s.name;
            select.appendChild(option);
        });

        const customOption = document.createElement('option');
        customOption.value = 'custom';
        customOption.textContent = '직접 입력';
        select.appendChild(customOption);
    }

    // 고객용 가격표 표시
    function loadPriceListForCustomer() {
        const listDiv = document.getElementById('customer-price-list');

        if (mockServices.length === 0) {
            listDiv.innerHTML = '<div class="empty-state"><div class="icon">💇</div>등록된 서비스가 없습니다</div>';
            return;
        }

        listDiv.innerHTML = mockServices.map(s => `
            <div class="price-item">
                <span class="service-name">${s.name}</span>
                <span class="service-price">${s.price.toLocaleString()}원</span>
            </div>
        `).join('');
    }

    // 생일 고객 목록 로드
    function loadBirthdayCustomers() {
        const listDiv = document.getElementById('birthday-customer-list');
        const today = new Date();
        const currentMonth = today.getMonth();

        const birthdayCustomers = mockCustomers.filter(c => {
            if (!c.birthday) return false;
            const bday = new Date(c.birthday);
            return bday.getMonth() === currentMonth;
        });

        if (birthdayCustomers.length === 0) {
            listDiv.innerHTML = '<div class="empty-state"><div class="icon">🎂</div>이번 달 생일인 고객이 없습니다</div>';
            return;
        }

        listDiv.innerHTML = birthdayCustomers.map(c => {
            const bday = new Date(c.birthday);
            const couponStatus = c.birthdayCoupon === 'active' ? 'active' :
                                 c.birthdayCoupon === 'used' ? 'used' : 'none';
            const couponText = couponStatus === 'active' ? '쿠폰 발급됨' :
                               couponStatus === 'used' ? '사용 완료' : '미발급';

            return `
                <div class="customer-item">
                    <div class="info">
                        <h4>${c.name} <span class="birthday-badge">${bday.getMonth() + 1}/${bday.getDate()}</span></h4>
                        <p>${c.phone}</p>
                    </div>
                    <div>
                        <span class="coupon-status ${couponStatus}">${couponText}</span>
                        ${couponStatus === 'none' ? `<button class="btn btn-primary btn-small" style="margin-left:8px;" onclick="issueBirthdayCoupon('${c.id}')">발급</button>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    // 생일 쿠폰 발급
    function issueBirthdayCoupon(customerId) {
        const customer = mockCustomers.find(c => c.id === customerId);

        customer.birthdayCoupon = 'active';

        loadBirthdayCustomers();
        alert(`${customer.name} 고객님에게 생일 쿠폰이 발급되었습니다!`);
    }

    // 쿠폰 미리보기 업데이트
    function updateCouponPreview() {
        const type = document.getElementById('birthday-coupon-type').value;
        const value = document.getElementById('birthday-coupon-value').value || 0;
        const service = document.getElementById('birthday-coupon-service');
        const serviceName = service.options[service.selectedIndex].text;
        const valueGroup = document.getElementById('coupon-value-group');

        let preview = '';

        if (type === 'percent') {
            valueGroup.style.display = 'block';
            document.querySelector('#coupon-value-group label').textContent = '할인율 (%)';
            preview = `${serviceName} ${value}% 할인`;
        } else if (type === 'amount') {
            valueGroup.style.display = 'block';
            document.querySelector('#coupon-value-group label').textContent = '할인 금액 (원)';
            preview = `${serviceName} ${parseInt(value).toLocaleString()}원 할인`;
        } else if (type === 'free') {
            valueGroup.style.display = 'none';
            preview = `${serviceName} 무료`;
        }

        document.getElementById('coupon-preview').textContent = preview;
    }

    // 생일 쿠폰 설정 저장
    function saveBirthdayCouponSettings() {
        const enabled = document.getElementById('birthday-coupon-enabled').value;
        const type = document.getElementById('birthday-coupon-type').value;
        const value = document.getElementById('birthday-coupon-value').value;
        const service = document.getElementById('birthday-coupon-service').value;
        const preview = document.getElementById('coupon-preview').textContent;

        const settings = {
            enabled: enabled === 'true',
            type: type,
            value: parseInt(value) || 0,
            service: service,
            description: preview
        };

        localStorage.setItem('birthdayCouponSettings', JSON.stringify(settings));
        alert('생일 쿠폰 설정이 저장되었습니다!');
    }

    // 생일 쿠폰 설정 불러오기
    function loadBirthdayCouponSettings() {
        const saved = localStorage.getItem('birthdayCouponSettings');

        if (saved) {
            const settings = JSON.parse(saved);
            document.getElementById('birthday-coupon-enabled').value = settings.enabled ? 'true' : 'false';
            document.getElementById('birthday-coupon-type').value = settings.type || 'percent';
            document.getElementById('birthday-coupon-value').value = settings.value || 50;
            document.getElementById('birthday-coupon-service').value = settings.service || 'all';
        }

        updateCouponPreview();
    }

    // 쿠폰 설정 가져오기
    function getBirthdayCouponSettings() {
        const saved = localStorage.getItem('birthdayCouponSettings');
        if (saved) {
            return JSON.parse(saved);
        }
        return {
            enabled: true,
            type: 'percent',
            value: 50,
            service: 'all',
            description: '전체 서비스 50% 할인'
        };
    }

    // 모달 열릴 때 데이터 로드
    const originalShowModal = showModal;
    showModal = function(modalId) {
        originalShowModal(modalId);

        if (modalId === 'service-manage') {
            loadServiceList();
        } else if (modalId === 'price-list') {
            loadPriceListForCustomer();
        } else if (modalId === 'birthday-manage') {
            loadBirthdayCouponSettings();
            loadBirthdayCustomers();
        }
    };

    // 페이지 로드 시
    document.addEventListener('DOMContentLoaded', () => {
        // 서비스 드롭다운 초기화
        updateServiceSelect();

        // 엔터키 이벤트
        document.getElementById('customer-name').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('phone-last4').focus();
        });
        document.getElementById('phone-last4').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') customerLogin();
        });
        document.getElementById('admin-password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') adminLogin();
        });
    });
</script>

</body>
</html>
